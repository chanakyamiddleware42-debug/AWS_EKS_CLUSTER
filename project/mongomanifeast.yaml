apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    project: roboshop
    application: mongodb
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      application: mongodb
  template:
    metadata:
      name: pod
      labels:
        project: roboshop
        application: mongodb
    spec:
      containers:
      - name: mongodb
        image: chanakya1991/mongodb
        