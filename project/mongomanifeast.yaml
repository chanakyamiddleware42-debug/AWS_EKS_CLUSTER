apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  labels:
    project: roboshop
    application: mongodb
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      application: mongodb
  template:
    metadata:
      name: pod
      labels:
        project: roboshop
        application: mongodb
    spec:
      containers:
      - name: mongodb
        image: chanakya1991/mongodb:v2
  
---
apiVersion: v1 
kind: Service
metadata:
  name: mongodb
  labels:
    project: roboshop
    application: mongodb
spec:
  selector:
    project: roboshop
    application: mongodb
  ports:
  - protocol: tcp
    port: 27017
    targetPort: 27107
    


        